<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeCinema — Under Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sun: #FFB800;
            --amber: #FF9500;
            --tangerine: #FF6D00;
            --ember: #E65100;
            --midnight: #0D0A06;
            --warm-black: #1A1408;
            --cream: #FFF8E7;
            --gold-mist: rgba(255, 184, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--midnight);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── Animated grain overlay ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.5;
            pointer-events: none;
            z-index: 100;
        }

        /* ── Floating orbs ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 12s ease-in-out infinite;
            pointer-events: none;
        }
        .orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--sun), transparent 70%);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--tangerine), transparent 70%);
            bottom: -15%; right: -8%;
            animation-delay: -4s;
            animation-duration: 15s;
        }
        .orb-3 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, var(--amber), transparent 70%);
            top: 50%; left: 60%;
            animation-delay: -8s;
            animation-duration: 18s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ── Film reel strip decorations ── */
        .film-strip {
            position: fixed;
            width: 60px;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 8px,
                rgba(255, 184, 0, 0.06) 8px,
                rgba(255, 184, 0, 0.06) 12px,
                transparent 12px,
                transparent 28px
            );
            opacity: 0.5;
            pointer-events: none;
        }
        .film-strip-left {
            left: 30px; top: 0; bottom: 0;
            border-left: 1px solid rgba(255, 184, 0, 0.08);
            border-right: 1px solid rgba(255, 184, 0, 0.08);
            animation: scrollFilm 20s linear infinite;
        }
        .film-strip-right {
            right: 30px; top: 0; bottom: 0;
            border-left: 1px solid rgba(255, 184, 0, 0.08);
            border-right: 1px solid rgba(255, 184, 0, 0.08);
            animation: scrollFilm 25s linear infinite reverse;
        }

        @keyframes scrollFilm {
            from { background-position: 0 0; }
            to { background-position: 0 280px; }
        }

        /* ── Sparkle particles ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: var(--sun);
            border-radius: 50%;
            animation: rise linear infinite;
            opacity: 0;
        }
        @keyframes rise {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-10vh) scale(1); }
        }

        /* ── Main container ── */
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 720px;
            position: relative;
            z-index: 10;
        }

        /* ── Logo area ── */
        .logo-wrapper {
            margin-bottom: 2rem;
            animation: fadeSlideUp 1s ease-out 0.2s both;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--sun) 0%, var(--tangerine) 50%, var(--ember) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            display: inline-block;
        }
        .logo::after {
            content: '';
            position: absolute;
            bottom: -4px; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--sun), transparent);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%, 100% { opacity: 0.3; transform: scaleX(0.6); }
            50% { opacity: 1; transform: scaleX(1); }
        }

        .logo-dot {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            background: var(--tangerine);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* ── Cinema icon ── */
        .cinema-icon {
            margin: 0 auto 2.5rem;
            width: 90px; height: 90px;
            position: relative;
            animation: fadeSlideUp 1s ease-out 0.5s both;
        }
        .cinema-icon svg {
            width: 100%; height: 100%;
            filter: drop-shadow(0 0 30px rgba(255, 184, 0, 0.4));
        }
        .reel-spin {
            animation: spin 6s linear infinite;
            transform-origin: center;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Heading ── */
        .heading {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: clamp(1.4rem, 3.5vw, 2.2rem);
            line-height: 1.3;
            margin-bottom: 1.2rem;
            animation: fadeSlideUp 1s ease-out 0.7s both;
        }
        .heading em {
            font-style: italic;
            color: var(--sun);
        }

        /* ── Subtext ── */
        .subtext {
            font-size: clamp(0.95rem, 2vw, 1.15rem);
            font-weight: 300;
            color: rgba(255, 248, 231, 0.6);
            line-height: 1.7;
            max-width: 500px;
            margin: 0 auto 3rem;
            animation: fadeSlideUp 1s ease-out 0.9s both;
        }

        /* ── Progress bar ── */
        .progress-area {
            margin-bottom: 3rem;
            animation: fadeSlideUp 1s ease-out 1.1s both;
        }
        .progress-label {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--amber);
            margin-bottom: 0.8rem;
        }
        .progress-track {
            width: 280px;
            height: 4px;
            background: rgba(255, 184, 0, 0.1);
            border-radius: 99px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            width: 65%;
            background: linear-gradient(90deg, var(--sun), var(--tangerine));
            border-radius: 99px;
            position: relative;
            animation: progressGlow 2s ease-in-out infinite;
        }
        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0; top: -3px;
            width: 10px; height: 10px;
            background: var(--sun);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--sun), 0 0 30px rgba(255, 184, 0, 0.5);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes progressGlow {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.7; }
        }



        /* ── Countdown ── */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            animation: fadeSlideUp 1s ease-out 1s both;
        }
        .countdown-item {
            text-align: center;
        }
        .countdown-num {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: clamp(2rem, 5vw, 3.2rem);
            background: linear-gradient(180deg, var(--sun), var(--tangerine));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            display: block;
        }
        .countdown-label {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 248, 231, 0.35);
            margin-top: 0.4rem;
        }
        .countdown-sep {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--tangerine);
            opacity: 0.3;
            align-self: flex-start;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0.08; }
        }



        /* ── Footer ── */
        .footer {
            margin-top: 3rem;
            font-size: 0.75rem;
            color: rgba(255, 248, 231, 0.2);
            animation: fadeSlideUp 1s ease-out 1.7s both;
        }

        /* ── Shared animation ── */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .film-strip { display: none; }
            .countdown { gap: 0.8rem; }
            .countdown-sep { font-size: 1.8rem; }
            .input-group {
                flex-direction: column;
                border-radius: 16px;
            }
            .input-group button {
                border-radius: 0 0 16px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Background effects -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="film-strip film-strip-left"></div>
    <div class="film-strip film-strip-right"></div>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Main content -->
    <div class="container">

        <div class="logo-wrapper">
            <span class="logo">WeCinema</span><span class="logo-dot">.</span>
        </div>

        <!-- Animated film reel icon -->
        <div class="cinema-icon">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g class="reel-spin">
                    <circle cx="50" cy="50" r="42" stroke="url(#grad)" stroke-width="2.5" fill="none" opacity="0.6"/>
                    <circle cx="50" cy="50" r="30" stroke="url(#grad)" stroke-width="1.5" fill="none" opacity="0.3"/>
                    <circle cx="50" cy="50" r="6" fill="#FFB800"/>
                    <circle cx="50" cy="22" r="5" fill="#FF9500" opacity="0.8"/>
                    <circle cx="74" cy="36" r="5" fill="#FF9500" opacity="0.8"/>
                    <circle cx="74" cy="64" r="5" fill="#FF9500" opacity="0.8"/>
                    <circle cx="50" cy="78" r="5" fill="#FF9500" opacity="0.8"/>
                    <circle cx="26" cy="64" r="5" fill="#FF9500" opacity="0.8"/>
                    <circle cx="26" cy="36" r="5" fill="#FF9500" opacity="0.8"/>
                </g>
                <defs>
                    <linearGradient id="grad" x1="0" y1="0" x2="100" y2="100">
                        <stop offset="0%" stop-color="#FFB800"/>
                        <stop offset="100%" stop-color="#FF6D00"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>

        <h1 class="heading">We're crafting something <em>cinematic</em></h1>
        <p class="subtext">Our team is behind the scenes, building a brand new experience. The premiere is coming soon.</p>

        <!-- Countdown -->
        <div class="countdown">
            <div class="countdown-item">
                <span class="countdown-num" id="days">14</span>
                <span class="countdown-label">Days</span>
            </div>
            <span class="countdown-sep">:</span>
            <div class="countdown-item">
                <span class="countdown-num" id="hours">08</span>
                <span class="countdown-label">Hours</span>
            </div>
            <span class="countdown-sep">:</span>
            <div class="countdown-item">
                <span class="countdown-num" id="minutes">42</span>
                <span class="countdown-label">Minutes</span>
            </div>
            <span class="countdown-sep">:</span>
            <div class="countdown-item">
                <span class="countdown-num" id="seconds">00</span>
                <span class="countdown-label">Seconds</span>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-area">
            <div class="progress-label">Building in progress — 65%</div>
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>



        <div class="footer">&copy; 2026 WeCinema.co — All rights reserved</div>
    </div>

    <script>
        // ── Particles ──
        const particlesEl = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            p.style.background = ['#FFB800','#FF9500','#FF6D00'][Math.floor(Math.random()*3)];
            particlesEl.appendChild(p);
        }

        // ── Countdown (14 days from now) ──
        const target = new Date(Date.now() + 16 * 24 * 60 * 60 * 1000);
        function updateCountdown() {
            const diff = Math.max(0, target - Date.now());
            const d = Math.floor(diff / 86400000);
            const h = Math.floor((diff % 86400000) / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('days').textContent = String(d).padStart(2, '0');
            document.getElementById('hours').textContent = String(h).padStart(2, '0');
            document.getElementById('minutes').textContent = String(m).padStart(2, '0');
            document.getElementById('seconds').textContent = String(s).padStart(2, '0');
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);


    </script>
</body>
</html>
